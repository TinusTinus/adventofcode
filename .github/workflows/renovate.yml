name: Renovate
on:
  schedule:
    # Daily, at midnight.
    - cron: '0 0 * * *'
  # Can also be triggered manually.
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Renovate
        uses: renovatebot/github-action@v46.1.16
        with:
          configurationFile: renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
